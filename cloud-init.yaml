#cloud-config

# Write SSH config for custom port
write_files:
  - path: /etc/ssh/sshd_config.d/custom_port.conf
    content: |
      Port ${ssh_port}
    owner: root:root
    permissions: "0644"
%{ if enable_postgres ~}

  # Write pgAdmin server configuration and password file
  - path: /opt/pgadmin/servers.json
    content: |
      {
        "Servers": {
          "1": {
            "Name": "PostgreSQL",
            "Group": "Servers",
            "Host": "postgres",
            "Port": 5432,
            "MaintenanceDB": "postgres",
            "Username": "postgres",
            "PassFile": "/pgadmin4/pgpassfile",
            "SSLMode": "prefer"
          }
        }
      }
    owner: root:root
    permissions: "0644"

  - path: /opt/pgadmin/pgpassfile
    content: |
      *:5432:*:postgres:${password}
    owner: root:root
    permissions: "0600"
%{ endif ~}
%{ if enable_mongo ~}

  # Write Mongo Express environment config
  - path: /opt/mongo-express/.env
    content: |
      ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      ME_CONFIG_MONGODB_ADMINPASSWORD=${password}
      ME_CONFIG_MONGODB_URL=mongodb://admin:${password}@mongo:27017/
      ME_CONFIG_BASICAUTH=true
      ME_CONFIG_BASICAUTH_USERNAME=admin
      ME_CONFIG_BASICAUTH_PASSWORD=${password}
    owner: root:root
    permissions: "0600"

%{ endif ~}

package_update: true
package_upgrade: true

ssh_pwauth: false
allow_public_ssh_keys: true
ssh_authorized_keys:
  - ${public_key}

# Install Docker from the official Docker repository
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unattended-upgrades

runcmd:
  # Restart SSH to apply port configuration
  - systemctl restart ssh
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io
  - systemctl enable docker
  - systemctl start docker

  # Run postgres and pgadmin containers
%{ if enable_postgres ~}
  - docker network create pg-network
  - docker volume create pgdata
  - docker volume create pgadmin
  - docker run --name postgres --restart always -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=${password} --network pg-network -p 127.0.0.1:5432:5432 -v pgdata:/var/lib/postgresql/docker -d postgres:18
  - chown 5050:5050 /opt/pgadmin/pgpassfile
  - docker run --name pgadmin --restart always -e PGADMIN_DEFAULT_EMAIL=postgres@example.com -e PGADMIN_DEFAULT_PASSWORD=${password} -e PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False -e PGPASSFILE=/pgadmin4/pgpassfile --network pg-network -p 127.0.0.1:8080:80 -v pgadmin:/var/lib/pgadmin -v /opt/pgadmin/servers.json:/pgadmin4/servers.json:ro -v /opt/pgadmin/pgpassfile:/pgadmin4/pgpassfile -d dpage/pgadmin4:latest
%{ endif ~}

  # Run MongoDB and Mongo Express containers
%{ if enable_mongo ~}
  - docker network create mongo-network
  - docker volume create mongodata
  - docker run --name mongo --restart always -e MONGO_INITDB_ROOT_USERNAME=admin -e MONGO_INITDB_ROOT_PASSWORD=${password} --network mongo-network -p 127.0.0.1:27017:27017 -v mongodata:/data/db -d mongo:8
  - docker run --name mongo-express --restart always --env-file /opt/mongo-express/.env --network mongo-network -p 127.0.0.1:8081:8081 -d mongo-express:latest
%{ endif ~}

  # Install lazydocker 
%{ if enable_lazydocker ~}
  - |
    ARCH="$(uname -m)"
    case "$ARCH" in
      x86_64)
        LAZYDOCKER_ARCH="x86_64"
        ;;
      aarch64|arm64)
        LAZYDOCKER_ARCH="arm64"
        ;;
      *)
        echo "Unsupported architecture for lazydocker: $ARCH" >&2
        exit 1
        ;;
    esac

    LAZYDOCKER_VERSION="$(curl -fsSL https://api.github.com/repos/jesseduffield/lazydocker/releases/latest | grep -Po '"tag_name":\s*"v\K[^"]+')"

    curl -fsSL "https://github.com/jesseduffield/lazydocker/releases/download/v$${LAZYDOCKER_VERSION}/lazydocker_$${LAZYDOCKER_VERSION}_Linux_$${LAZYDOCKER_ARCH}.tar.gz" \
      | tar -C /usr/local/bin -xzvf - lazydocker
  - chmod +x /usr/local/bin/lazydocker
%{ endif ~}


power_state:
  delay: now
  mode: reboot
  message: "Rebooting after initial setup"
  condition: true

final_message: "The system is up"
